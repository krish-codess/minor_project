<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parking Entry — Slot {{ slot.id }}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0f1117;color:#e8eaf0;font-family:'Segoe UI',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#1a1d2e;border-radius:20px;padding:36px 32px;width:100%;max-width:420px;
      border:2px solid #00e67644;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.6)}
    h1{font-size:1.6rem;color:#00d4ff;margin-bottom:6px}
    .slot-num{font-size:4rem;font-weight:900;color:#00e676;margin:18px 0 6px}
    .sub{color:#8892a4;font-size:.9rem;margin-bottom:24px}
    label{display:block;text-align:left;margin-bottom:6px;color:#8892a4;font-size:.82rem}
    input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #2a2f4e;
      background:#12152a;color:#e8eaf0;font-size:1rem;outline:none;letter-spacing:1px;
      text-transform:uppercase}
    input:focus{border-color:#00d4ff}
    button{width:100%;padding:14px;background:linear-gradient(135deg,#00d4ff,#0099cc);
      border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;
      color:#000;margin-top:16px;transition:.15s}
    button:hover{filter:brightness(1.1)}
    .msg{margin-top:14px;font-size:.85rem;color:#ff4444;min-height:20px}
    .success{display:none;padding:20px;text-align:center}
    .check{font-size:3.5rem}
    .home{display:block;margin-top:16px;color:#00d4ff;text-decoration:none;font-size:.85rem}
  </style>
</head>
<body>
<div class="card">
  <h1>🔖 Parking Entry</h1>
  <div class="slot-num">P{{ slot.id }}</div>
  <p class="sub">Scan detected — enter your vehicle or FASTag ID</p>

  <div id="form-section">
    <label>Vehicle / FASTag ID</label>
    <input id="vehicle" placeholder="e.g. MH12AB1234" maxlength="20"
           onkeydown="if(event.key==='Enter') submit()"/>
    <button onclick="submit()">Confirm Entry ➜</button>
    <p class="msg" id="msg"></p>
  </div>

  <div class="success" id="success">
    <div class="check">✅</div>
    <h2 style="color:#00e676;margin:10px 0">Entry Logged!</h2>
    <p style="color:#8892a4;font-size:.85rem">Slot P{{ slot.id }} is now reserved for you.</p>
    <p style="color:#ffd600;font-size:.85rem;margin-top:8px" id="entry-time"></p>
    <a href="/" class="home">← Back to Dashboard</a>
  </div>
</div>

<script>
async function submit(){
  const vehicle = document.getElementById('vehicle').value.trim().toUpperCase();
  if(!vehicle){ document.getElementById('msg').textContent='Please enter a vehicle ID.'; return; }

  const r = await fetch('/api/entry', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({slot_id: '{{ slot.id }}', vehicle_id: vehicle})
  });
  const d = await r.json();
  if(d.success){
    document.getElementById('form-section').style.display='none';
    document.getElementById('success').style.display='block';
    document.getElementById('entry-time').textContent =
      '🕐 Entry time: ' + new Date(d.entry_time).toLocaleTimeString();
  } else {
    document.getElementById('msg').textContent = d.message;
  }
}
document.getElementById('vehicle').focus();
</script>
</body>
</html>
