<svg width="1000" height="680" xmlns="http://www.w3.org/2000/svg">  <!-- INPUTS -->  <rect x="55" y="50" width="130" height="56" rx="12" fill="#B3C6E7" stroke="#333" stroke-width="2"/>  <text x="120" y="78" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">RFID Reader</text>  <rect x="210" y="50" width="130" height="56" rx="12" fill="#B3C6E7" stroke="#333" stroke-width="2"/>  <text x="275" y="78" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">LPR Camera</text>  <rect x="370" y="50" width="130" height="56" rx="12" fill="#B3C6E7" stroke="#333" stroke-width="2"/>  <text x="435" y="78" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Ultrasonic Sensor</text>    <rect x="530" y="50" width="130" height="56" rx="12" fill="#B3C6E7" stroke="#333" stroke-width="2"/>  <text x="595" y="78" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">QR Scanner</text>  <!-- ARROWS DOWN -->  <line x1="120" y1="106" x2="120" y2="139" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <line x1="275" y1="106" x2="275" y2="139" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <line x1="435" y1="106" x2="435" y2="139" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <line x1="595" y1="106" x2="595" y2="139" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <!-- PROCESSING -->  <rect x="90" y="145" width="180" height="61" rx="10" fill="#FFFFDD" stroke="#333" stroke-width="2"/>  <text x="180" y="174" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Gate Controller</text>  <text x="180" y="192" font-size="11" text-anchor="middle" font-family="sans-serif" fill="#444">API, Blacklist Check</text>  <rect x="290" y="145" width="180" height="61" rx="10" fill="#FFFFDD" stroke="#333" stroke-width="2"/>  <text x="380" y="174" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Plate Recognition</text>  <text x="380" y="192" font-size="11" text-anchor="middle" font-family="sans-serif" fill="#444">LPR, QR Parse</text>  <rect x="490" y="145" width="180" height="61" rx="10" fill="#FFFFDD" stroke="#333" stroke-width="2"/>  <text x="580" y="174" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Slot Assignment</text>  <text x="580" y="192" font-size="11" text-anchor="middle" font-family="sans-serif" fill="#444">EV & Regular</text>  <!-- ARROWS DOWN -->  <line x1="180" y1="206" x2="180" y2="239" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <line x1="380" y1="206" x2="380" y2="239" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <line x1="580" y1="206" x2="580" y2="239" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <!-- DATABASE LAYER -->  <rect x="120" y="245" width="160" height="56" rx="10" fill="#FFE8D6" stroke="#333" stroke-width="2"/>  <text x="200" y="273" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Slot Table</text>  <rect x="320" y="245" width="160" height="56" rx="10" fill="#FFE8D6" stroke="#333" stroke-width="2"/>  <text x="400" y="273" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Transactions Log</text>  <rect x="520" y="245" width="160" height="56" rx="10" fill="#FFE8D6" stroke="#333" stroke-width="2"/>  <text x="600" y="273" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Change/Audit Log</text>  <!-- ARROWS DOWN -->  <line x1="200" y1="301" x2="200" y2="339" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <line x1="400" y1="301" x2="400" y2="339" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <line x1="600" y1="301" x2="600" y2="339" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <!-- SMART POLICY LAYER -->  <rect x="180" y="350" width="170" height="56" rx="10" fill="#D3E1D0" stroke="#333" stroke-width="2"/>  <text x="265" y="378" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Billing/Time</text>  <text x="265" y="396" font-size="11" text-anchor="middle" font-family="sans-serif" fill="#444">Dynamic, EV, Discount</text>  <rect x="390" y="350" width="170" height="56" rx="10" fill="#D3E1D0" stroke="#333" stroke-width="2"/>  <text x="475" y="378" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Surge/Discounts</text>  <text x="475" y="396" font-size="11" text-anchor="middle" font-family="sans-serif" fill="#444">VIP, Policy Rules</text>  <!-- ARROWS TO BOTTOM OUTPUT -->  <line x1="265" y1="406" x2="265" y2="449" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <line x1="475" y1="406" x2="475" y2="449" stroke="#222" stroke-width="2" marker-end="url(#arrow)"/>  <!-- OUTPUTS -->  <rect x="80" y="460" width="120" height="48" rx="9" fill="#E3E6EB" stroke="#333" stroke-width="2"/>  <text x="140" y="487" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Gate Control</text>  <rect x="220" y="460" width="120" height="48" rx="9" fill="#E3E6EB" stroke="#333" stroke-width="2"/>  <text x="280" y="487" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Display/LCD</text>  <rect x="360" y="460" width="120" height="48" rx="9" fill="#E3E6EB" stroke="#333" stroke-width="2"/>  <text x="420" y="487" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Dashboard</text>  <rect x="500" y="460" width="120" height="48" rx="9" fill="#E3E6EB" stroke="#333" stroke-width="2"/>  <text x="560" y="487" font-size="14" text-anchor="middle" font-family="sans-serif" fill="#222">Invoice/Receipt</text>  <!-- MARKER -->  <defs>    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">      <path d="M0,0 L0,6 L9,3 z" fill="#222" />    </marker>  </defs>  <!-- TITLE -->  <text x="500" y="24" text-anchor="middle" font-size="20" font-family="sans-serif" fill="#222">    RFID Parking Management System — Architecture  </text></svg>